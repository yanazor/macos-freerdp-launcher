name: macOS checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check shell syntax
        shell: bash
        run: |
          while IFS= read -r -d '' file; do
            echo "Checking $file"
            bash -n "$file"
          done < <(
            find . -type f \
              \( -name '*.sh' -o -name '*.command' \) \
              -print0
          )

      - name: Validate property lists
        shell: bash
        run: |
          while IFS= read -r -d '' file; do
            echo "Checking $file"
            plutil -lint "$file"
          done < <(
            find . -type f -name 'Info.plist' -print0
          )
