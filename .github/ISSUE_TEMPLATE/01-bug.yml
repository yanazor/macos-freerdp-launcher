name: Bug report
description: Report a reproducible problem
title: "[Bug] "
labels:
  - bug

body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe what happened.
      placeholder: A clear description of the problem.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Describe what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the commands or actions needed to reproduce the problem.
      placeholder: |
        1. Run ...
        2. Select ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error message
      description: Paste the complete error message or traceback.
      render: text
    validations:
      required: false

  - type: input
    id: operating_system
    attributes:
      label: Operating system
      placeholder: "For example: macOS 26 or Ubuntu 24.04"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Project version
      placeholder: "For example: v0.2.3 or a commit hash"
    validations:
      required: false
