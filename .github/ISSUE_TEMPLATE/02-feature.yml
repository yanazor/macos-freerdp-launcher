name: Feature request
description: Suggest an improvement or new feature
title: "[Feature] "
labels:
  - enhancement

body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem or limitation does this proposal address?
      placeholder: Describe the current limitation.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the change you would like to see.
      placeholder: Explain the proposed behavior.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Describe any alternative approaches you considered.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add examples or other relevant information.
    validations:
      required: false
